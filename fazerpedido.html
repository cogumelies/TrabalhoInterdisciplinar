<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Fazer Pedido - Chocoholic</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <a href="css/variaveis.css"></a>
</head>

<body>
        <nav>
            <a href="land.html">Início</a>
            <a href="produtos.html">Produtos</a>
            <a href="contato.html">Contato</a>
            <a href="fazerpedido.html">Fazer Pedido</a>
            <a href="cadastrodeprodutos.html">Cadastro de Produtos</a>
            <a href="sobre.html">Sobre</a>
        </nav>
    <main>
        <h1>🍫 Fazer Pedido</h1>

        <form id="formPedido" class="formPedido">

            <label for="inNome">Nome:</label><br>
            <input type="text" id="inNome" name="nomeCliente">

            <label for="inTelefone">Telefone:</label><br>
            <input type="tel" id="inTelefone" name="telefoneCliente">

            <label for="sltProduto">Produto desejado:</label><br>
            <select id="sltProduto" name="produtoPedido">
                <option value="" selected disabled>Selecione:</option>
                <option value="Caixa Artesanal Bombons Napolitano, 175g"> Caixa Artesanal Bombons Napolitano, 175g </option>
                <option value="Caixa Coração Bombons ao Leite, 185g"> Caixa Coração Bombons ao Leite, 185g</option>
                <option value="Caixa Bombons Zero Açúcar, 135g"> Caixa Bombons Zero Açúcar, 135g</option>
                <option value="Barra Chocolate Recheada Avelã, 100g"> Barra Chocolate Recheada Avelã, 100g </option> 
                <option value="Barra Chocolate Recheada Morango, 100g">Barra Chocolate Recheada Morango, 100g </option>
            
            
            </select>
            <br><br>

            <label for="inQuantidade">Quantidade:</label><br>
            <input type="number" id="inQuantidade" name="quantidadePedido">

            <p>Forma de entrega:</p>

            <input type="radio" id="entregaRetirada" name="formaEntrega" value="Retirada">
            <label for="entregaRetirada">Retirada na loja</label><br>

            <input type="radio" id="entregaDelivery" name="formaEntrega" value="Entrega">
            <label for="entregaDelivery">Entrega</label><br><br>

            <label for="inEndereco">Endereço:</label><br>
            <input type="text" id="inEndereco" name="enderecoCliente"
                placeholder="Preencha apenas se escolher entrega">

            <label for="sltPagamento">Forma de pagamento:</label><br>
            <select id="sltPagamento" name="formaPagamento">
                <option value="" selected disabled>Selecione:</option>
                <option value="Pix">Pix</option>
                <option value="Cartão de crédito">Cartão de crédito</option>
                <option value="Cartão de débito">Cartão de débito</option>
            
            </select>
            <br><br>

            <label for="inObservacao">Observações:</label><br>
            <textarea id="inObservacao" name="observacaoPedido" rows="4" cols="40" maxlength="150"
                placeholder="Exemplo: embalagem para presente, horário preferido..."></textarea>
            <br><br>

            <button type="button" id="btnPedido"> Fazer Pedido </button>

            <p id="outSaida"></p>

        </form>
    </main>

    <footer class="rodape">
        <p>Contato: chocoholic@gmail.com</p>
        <p>© 2026 Chocoholic • Todos os direitos reservados</p>
    </footer>


    <script src="/script/pedidos.js"></script>
</body>

</html>
