<body>
    <h1>Faça Login</h1>

    <label for="">Email:</label>
    <input type="email" name="email" id="" required oninvalid="this.setCustomValidity('Digite um email válido')"

    pattern='[@]' ">

    <label for="">Senha:</label>
    <input type="password" name="senha" id="" required oninvalid="this.setCustomValidity('A senha está inválida')"
        oninput="this.setCustomValidity('')">
    
    <a href="./produtos.html">
            <button>Entrar</button>
    </a>
