<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro Chocoholic</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav>
        <a href="land.html">Início</a>
        <a href="produtos.html">Produtos</a>
        <a href="contato.html">Contato</a>
        <a href="cadastro.html">Cadastro</a>
        <a href="sobre.html">Sobre</a>
    </nav>
    <h1>🍫 Cadastro Chocoholic</h1>

    <form>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome_cliente"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email_cliente"><br><br>

        <label>Senha:</label><br>
        <input type="password" name="senha_cliente"><br><br>

        <label>Idade:</label><br>
        <input type="number" name="idade_cliente"><br><br>

        <label>Tipo de chocolate favorito:</label><br>
        <select name="tipo_chocolate">
            <option>Ao leite</option>
            <option>Amargo</option>
            <option>Branco</option>
        </select>
        <br><br>

        <label>Frequência de consumo:</label><br>
        <input type="radio" name="frequencia" value="diario"> Diário<br>
        <input type="radio" name="frequencia" value="semanal"> Semanal<br>
        <input type="radio" name="frequencia" value="mensal"> Mensal<br><br>

        <label>Quais produtos você gosta?</label><br>
        <input type="checkbox" name="preferencias" value="trufas"> Trufas<br>
        <input type="checkbox" name="preferencias" value="barras"> Barras<br>
        <input type="checkbox" name="preferencias" value="bombons"> Bombons<br><br>

        <input type="submit" value="Enviar">

        <div class="link-login">
            <p>Já tem uma conta? <a href="login.html">Entrar</a></p>
        </div>

    </form>

    <footer class="rodape">

        <p>📷 Instagram | 🎵 TikTok | 💌 Pinterest</p>

        <p>Contato: chocoholic@gmail.com</p>

        <p>© 2026 Chocoholic • Todos os direitos reservados</p>

    </footer>


    <script src="./script/cadastro.js"></script>
</body>

</html>
