<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro de produtos</title>
    <link rel="stylesheet" href="css/estilizar.css">
</head>

<body>

    <header class="classHeader">
        <nav class="menu">
            <a href="land.html">Início</a>
            <a href="produtos.html">Produtos</a>
            <a href="contato.html">Contato</a>
            <a href="cadastro.html">Cadastro</a>
        </nav>
    </header>

    <main>
        <h1>🍫 Cadastro de Chocolates</h1>

        <form id="formCadastroChocolates" class="formCadastroChocolates">

            <label for="cadNomeChocolate">chocolate:</label>
            <input type="text" id="cadNomeChocolate" required
                oninvalid="this.setCustomValidity('Insira um nome para o chocolate válido!')"
                oninput="this.setCustomValidity('')">

            <label for="cadPrecoChocolate">preço:</label>
            <input type="number" id="cadPrecoChocolate" min="0.01" step="0.01" required
                oninvalid="this.setCustomValidity('Insira um valor válido!')"
                oninput="this.setCustomValidity('')">

            <label for="cadDescricao">descrição do produto:</label>
            <textarea id="cadDescricao" rows="4" cols="40" minlength="10" maxlength="100" required
                oninvalid="this.setCustomValidity('Insira uma descrição entre 10 e 100 caracteres!')"
                oninput="this.setCustomValidity('')"></textarea>

            <label for="cadCategoria">categoria:</label>
            <input type="text" id="cadCategoria" required
                oninvalid="this.setCustomValidity('Insira uma categoria válida!')"
                oninput="this.setCustomValidity('')">

            <button type="submit" id="btn">Cadastrar produto</button>

        </form>
    </main>

    <p id="mensagemCadastroChocolate"></p>

     <footer class="rodape">

        <p>📷 Instagram | 🎵 TikTok | 💌 Pinterest</p>

        <p>Contato: chocoholic@gmail.com</p>

        <p>© 2026 Chocoholic • Todos os direitos reservados</p>

    </footer>


    <script src="script/cadastrochocolate.js"></script>
</body>

</html>
