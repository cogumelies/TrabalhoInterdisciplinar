<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Chocoholic</title>
    <meta name="description" content="Produtos da Chocoholic">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="topo">
        <nav>
            <a href="land.html">Início</a>
            <a href="produtos.html">Produtos</a>
            <a href="contato.html">Contato</a>
            <a href="fazerpedido.html">Fazer Pedido</a>
            <a href="cadastrodeprodutos.html">Cadastro de Produtos</a>
            <a href="sobre.html">Sobre</a>
        </nav>


        <section class="titulo-produtos">
            <h1>Nossos Produtos 🍫</h1>
            <p>Escolha seus chocolates favoritos.</p>
        </section>
    </header>

    <main>

        <section class="areaPesquisa">
            <label for="inPesquisa">Pesquisar produto:</label>
            <input type="text" id="inPesquisa" placeholder="Digite o nome do produto">

            <button type="button" id="btnPesquisar">Pesquisar</button>
        </section>

        <section class="areaFiltros">
            <h2>Filtrar produtos</h2>

            <label for="sltFiltroCategoria">Categoria:</label>
            <select id="sltFiltroCategoria">
                <option value="todos">Todos</option>
                <option value="Bombons">Bombons</option>
                <option value="Barras">Barras</option>
                <option value="Trufas">Trufas</option>
            </select>

            <label for="sltFiltroTipo">Tipo:</label>
            <select id="sltFiltroTipo">
                <option value="todos">Todos</option>
                <option value="Ao Leite">Ao Leite</option>
                <option value="Amargo">Amargo</option>
                <option value="Branco">Branco</option>
                <option value="Zero Açúcar">Zero Açúcar</option>
                <option value="Recheado">Recheado</option>
                <option value="Misto">Misto</option>
            </select>

            <label for="inFiltroPreco">Preço máximo:</label>
            <input type="number" id="inFiltroPreco" min="0" step="0.01" placeholder="Ex: 30">

            <button type="button" id="btnFiltrar">Filtrar</button>
            <button type="button" id="btnLimparFiltro">Mostrar todos</button>
        </section>

        <section id="listaProdutos" class="listaProdutos"></section>

    </main>

    <footer class="rodape">
        <p>📷 Instagram | 🎵 TikTok | 💌 Pinterest</p>
        <p>Contato: chocoholic@gmail.com</p>
        <p>© 2026 Chocoholic • Todos os direitos reservados</p>
    </footer>

    <script src="./script/produtos.js"></script>

</body>
</html>
